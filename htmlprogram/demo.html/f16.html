<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

<h2>Registration Form</h2>

<form>

    Name:<br>
    <input type="text" name="name"><br><br>

    Email:<br>
    <input type="email" name="email"><br><br>

    Password:<br>
    <input type="password" name="password"><br><br>

    Roll no:<br>
    <input type="Roll no" name="Roll no"<br><br>

    Gender:<br>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <br><br>
     <h2>Select Your Country</h2>

    <select name="country"><br>
        <option value="india">india</option>
        <option value="korea">korea</option>
        <option value="america">america</option>
        <option value="china">china</option>
        <option value="south korea">korea</option>
</select><br><br>
    <h2>Select Your Hobbies</h2>

    <form>
        <input type="checkbox" name="hobby" value="Reading"> Reading <br>
        <input type="checkbox" name="hobby" value="Music"> Music <br>
        <input type="checkbox" name="hobby" value="Sports"> Sports <br>
        <input type="checkbox" name="hobby" value="Traveling"> Traveling <br>
        <input type="checkbox" name="hobby" value="Gaming"> Gaming <br><br>

        <input type="submit" value="Submit">
    </form>
        <input type="submit"  value="Register">
        <input type="reset" value="clear">
    </form>  


</body>
</html>
