<!DOCTYPE html>
<html>
<head>

  <title>Arithmetic operrator example</title>
 </head>
 <body>

 	<h2>Arithmetic iopefrators in javascripts</h2>

 <script>
 	let a = 10;
 	let b =20;

 	document.write("a=" + a +"<br>");
 	document.write("b=" + b +"<br><br>");

 	document.write("a+b="+(a+b)+"<br>");

 	document.write("a-b="+(a-b)+"<br>");

 	document.write("a*b="+(a*b)+"<br>");

 	document.write("a/b="+(a/b)+"<br>");

 	document.write("a%b="+(a%b)+"<br>");

 	document.write("a**b="+(a**b)+"<br>");
 	
 </script>

</body>
</html>
