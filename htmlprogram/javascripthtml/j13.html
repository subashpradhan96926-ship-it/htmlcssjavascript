<!DOCTYPE html>
<html>
<head>
	<title>Assignment Oprators</title>
</head>
<body>

<h2>javascript Assignment Operators</h2>

<script>
	var a =10;

	document.write("initial value: " + a + "<br>");

	a += 5;
	document.write("After += : " + a + "<br>");

	a -= 3;
	document.write("After -= : " + a + "<br>");

	a *= 3;
	document.write("After *=: " + a + "<br>");

	a /= 4;
	document.write("After /=: " + a + "<br>");

	a %= 5;
	document.write("After %=: " + a + "<br>");
</script>

</body>
</html>
