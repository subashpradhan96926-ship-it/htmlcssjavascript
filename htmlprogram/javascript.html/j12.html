<!DOCTYPE html>
<html>
<head>
	<title>Logical Operators</title>
</head>
<body>
	
<script>
	var age = 20;
	var salary = 25000;

	document.write("age >= 18 && salary >=20000 :" 
		+(age >= 18 && salary >= 20000) + "<br>");

	document.write("age < 18 || salary >= 20000 :"
		+(age < 18 || salary >= 20000) + "<br>")

	document.write("!(age < 18) :"
		+!(age < 18) + "<br>");

</script>

</body>
</html>
