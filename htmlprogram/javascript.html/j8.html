<!DOCTYPE html>
<html>
<head>
	<title>comparison operators</title>
</head>
<body>
	
<h2>javascript comparison operators</h2>

<script>
	var a = 10;
	var b =20;

	document.write("a =" + a +"<br>")
	document.write("b =" + b +"<br><br>")

	document.write("a == b :" + (a == b ) + "<br>")
	document.write("a != b :" + (a != b ) + "<br>")
	document.write("a > b :" + (a > b ) + "<br>")
	document.write("a < b :" + (a < b ) + "<br>")
	document.write("a >= b :" + (a >= b ) + "<br>")
	document.write("a <= b :" + (a <= b ) + "<br>")

</script>

</body>
</html>
